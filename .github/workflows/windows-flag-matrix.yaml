name: Windows flag matrix

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-install:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: full
            disable_link_flags: "0"
            disable_cpu_flags: "0"
            disable_bigobj: "0"
          - name: no-bigobj
            disable_link_flags: "0"
            disable_cpu_flags: "0"
            disable_bigobj: "1"
          - name: no-cpu
            disable_link_flags: "0"
            disable_cpu_flags: "1"
            disable_bigobj: "0"
          - name: minimal
            disable_link_flags: "1"
            disable_cpu_flags: "1"
            disable_bigobj: "1"

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      ITKR_DISABLE_WINDOWS_LINK_FLAGS: ${{ matrix.disable_link_flags }}
      ITKR_DISABLE_WINDOWS_CPU_FLAGS: ${{ matrix.disable_cpu_flags }}
      ITKR_DISABLE_WINDOWS_BIGOBJ: ${{ matrix.disable_bigobj }}

    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          windows-path-include-rtools: true
          windows-path-include-mingw: true

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install dependencies
        shell: Rscript {0}
        run: |
          install.packages("remotes")
          remotes::install_deps(dependencies = TRUE)

      - name: Install ITKR
        shell: cmd
        run: |
          R CMD INSTALL --preclean . > install.log 2>&1
          if errorlevel 1 (
            echo ---- install.log tail ----
            powershell -NoLogo -NoProfile -Command "Get-Content install.log -Tail 200"
            exit /b 1
          )
