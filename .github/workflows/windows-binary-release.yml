name: Windows binary release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-binary:
    runs-on: windows-latest
    env:
      PACKAGE_ASSET: ITKR-${{ matrix.r-version }}.zip

    strategy:
      fail-fast: false
      matrix:
        r-version:
          - release
          - oldrel-1

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}
          windows-path-include-rtools: true
          windows-path-include-mingw: true

      - name: Install package dependencies
        shell: Rscript {0}
        run: |
          install.packages("Rcpp", repos = "https://cloud.r-project.org")

      - name: Build Windows binary
        shell: pwsh
        run: |
          R CMD INSTALL --build .
          $zip = Get-ChildItem -Path ., .. -Recurse -Filter 'ITKR_*.zip' | Select-Object -First 1
          if (-not $zip) {
            throw 'ITKR binary zip was not produced.'
          }
          $target = Join-Path $PWD $env:PACKAGE_ASSET
          if ($zip.FullName -ne $target) {
            Move-Item -Path $zip.FullName -Destination $target
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_ASSET }}
          path: ${{ env.PACKAGE_ASSET }}

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PACKAGE_ASSET }}
